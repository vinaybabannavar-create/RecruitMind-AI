name: RecruitMind AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run unit tests
      run: |
        python -m pytest tests/ -v

    - name: Lint check (import validation)
      run: |
        python -c "from pipeline.scorer import score_candidate, skill_match_score, experience_fit_score; print('All imports OK')"
        python -c "from pipeline.jd_parser import parse_jd; print('JD parser import OK')"
